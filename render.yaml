services:
  - type: web
    name: veltio
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CVR_STORAGE_DIR
        value: /var/data/veltio
      - key: SESSION_COOKIE_NAME
        value: veltio_sid
      - key: GA4_OAUTH_CLIENT_ID
        sync: false
      - key: GA4_OAUTH_CLIENT_SECRET
        sync: false
      - key: GA4_OAUTH_REDIRECT_URI
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
    disk:
      name: veltio-data
      mountPath: /var/data
      sizeGB: 1
