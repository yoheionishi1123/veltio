services:
  - type: web
    name: veltio
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CVR_STORAGE_DIR
        value: /var/data/veltio
      - key: SESSION_COOKIE_NAME
        value: veltio_sid
      - key: GA4_OAUTH_CLIENT_ID
        sync: false
      - key: GA4_OAUTH_CLIENT_SECRET
        sync: false
      - key: GA4_OAUTH_REDIRECT_URI
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: SELF_GA4_PROPERTY_ID
        sync: false
      - key: SELF_GA4_MEASUREMENT_ID
        value: G-VBKYWDLGE5
      - key: SELF_GA4_STREAM_ID
        value: 14131607973
      - key: SELF_GA4_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: SELF_GA4_SERVICE_ACCOUNT_PRIVATE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_BUSINESS_PRICE_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_BASE_URL
        value: https://app.vel-tio.com
    disk:
      name: veltio-data
      mountPath: /var/data
      sizeGB: 1
