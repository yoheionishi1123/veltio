<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>お問い合わせ | Veltio</title>
    <link rel="icon" href="/veltio-logo.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: "Noto Sans JP", "Hiragino Sans", sans-serif; color: #121926; background: #f8fafc; -webkit-font-smoothing: antialiased; }
      .topbar { background: #0b1320; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
      .topbar a { text-decoration: none; }
      .brand img { height: 28px; display: block; }
      .shell { max-width: 560px; margin: 0 auto; padding: 56px 24px 80px; }
      h1 { font-size: 28px; font-weight: 800; color: #0b1320; margin: 0 0 8px; }
      .sub { font-size: 14px; color: #667085; line-height: 1.8; margin: 0 0 36px; }
      .form-card { background: #fff; border: 1px solid #d0d5dd; border-radius: 16px; padding: 32px; box-shadow: 0 2px 8px rgba(10,40,100,0.05); }
      .field { display: grid; gap: 6px; margin-bottom: 20px; }
      label { font-size: 13px; font-weight: 700; color: #344054; }
      input, textarea, select { width: 100%; padding: 10px 12px; font-size: 14px; font-family: inherit; border: 1px solid #d0d5dd; border-radius: 8px; background: #fff; color: #121926; transition: border-color 0.15s; }
      input:focus, textarea:focus, select:focus { outline: none; border-color: #0a58ca; box-shadow: 0 0 0 3px rgba(10,88,202,0.1); }
      textarea { resize: vertical; min-height: 120px; }
      .submit-btn { width: 100%; padding: 12px; background: #0a58ca; color: #fff; border: none; border-radius: 999px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s; }
      .submit-btn:hover { background: #0847a8; }
      .submit-btn:disabled { background: #98a2b3; cursor: not-allowed; }
      #contact-status { margin-top: 16px; font-size: 13px; text-align: center; min-height: 20px; }
      .status-ok { color: #027a48; }
      .status-err { color: #b42318; }
      footer { background: #0b1320; padding: 20px 24px; text-align: center; color: #4a5a78; font-size: 12.5px; }
      footer a { color: #a0aec0; text-decoration: none; margin: 0 8px; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a href="/" class="brand"><img src="/veltio-logo.svg" alt="Veltio" /></a>
      <a href="/" style="color:#a0aec0;font-size:13px;font-weight:600;">← ホームに戻る</a>
    </header>

    <main class="shell">
      <h1>お問い合わせ</h1>
      <p class="sub">ご質問・ご要望・不具合報告はこちらからお送りください。通常2〜3営業日以内にご返信いたします。</p>

      <div class="form-card">
        <form id="contact-form">
          <div class="field">
            <label for="c-name">お名前 <span style="color:#b42318">*</span></label>
            <input id="c-name" type="text" placeholder="山田 太郎" required />
          </div>
          <div class="field">
            <label for="c-email">メールアドレス <span style="color:#b42318">*</span></label>
            <input id="c-email" type="email" placeholder="taro@example.com" required />
          </div>
          <div class="field">
            <label for="c-category">お問い合わせ種別</label>
            <select id="c-category">
              <option value="general">一般的なご質問</option>
              <option value="bug">不具合・エラー報告</option>
              <option value="billing">料金・プランについて</option>
              <option value="feature">機能リクエスト</option>
              <option value="other">その他</option>
            </select>
          </div>
          <div class="field">
            <label for="c-body">お問い合わせ内容 <span style="color:#b42318">*</span></label>
            <textarea id="c-body" placeholder="具体的な内容をご記入ください" required></textarea>
          </div>
          <button type="submit" class="submit-btn" id="contact-submit">送信する</button>
          <div id="contact-status"></div>
        </form>
      </div>
    </main>

    <footer>
      © Veltio
      <a href="/terms.html">利用規約</a>
      <a href="/privacy.html">プライバシーポリシー</a>
      <a href="/tokusho.html">特定商取引法</a>
      <a href="/contact.html">お問い合わせ</a>
    </footer>

    <script>
      document.getElementById("contact-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("contact-submit");
        const status = document.getElementById("contact-status");
        btn.disabled = true;
        btn.textContent = "送信中...";
        status.textContent = "";
        status.className = "";
        try {
          const res = await fetch("/api/contact", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: document.getElementById("c-name").value,
              email: document.getElementById("c-email").value,
              category: document.getElementById("c-category").value,
              body: document.getElementById("c-body").value
            })
          });
          if (!res.ok) {
            const d = await res.json().catch(() => ({}));
            throw new Error(d.message || "送信に失敗しました");
          }
          status.textContent = "送信が完了しました。ご返信をお待ちください。";
          status.className = "status-ok";
          e.target.reset();
        } catch (err) {
          status.textContent = err.message || "送信に失敗しました。しばらく経ってから再度お試しください。";
          status.className = "status-err";
        } finally {
          btn.disabled = false;
          btn.textContent = "送信する";
        }
      });
    </script>
  </body>
</html>
